    <path d="M364 160 V236" stroke="#a8b8c4" stroke-width="2"/>
    <circle cx="358" cy="176" r="1.7" fill="#5a6d7d"/>
    <circle cx="358" cy="192" r="1.7" fill="#5a6d7d"/>
    <!-- 受け取る両手 -->
    <path d="M340 166 Q316 168 300 162" stroke="#3d4e5e" stroke-width="2.4"/>
    <circle cx="296" cy="160" r="6" fill="#f6d7bd" stroke="#3d4e5e" stroke-width="2"/>
    <!-- 首・頭 -->
    <rect x="358" y="142" width="12" height="12" rx="4" fill="#f6d7bd"/>
    <circle cx="364" cy="118" r="28" fill="#f6d7bd" stroke="#3d4e5e" stroke-width="2.4"/>
    <!-- 白髪のお団子 -->
    <circle cx="364" cy="86" r="10" fill="#eceff2" stroke="#3d4e5e" stroke-width="1.8"/>
    <path d="M338 118 Q337 90 364 88 Q391 90 390 118 Q388 109 380 106 Q372 103 364 103 Q356 103 348 106 Q340 109 338 118 Z" fill="#eceff2" stroke="#3d4e5e" stroke-width="2"/>
    <!-- 表情（にっこり閉じ目） -->
    <path d="M348 118 q3 3 6 0 M374 118 q3 3 6 0" stroke="#3d4e5e" stroke-width="2"/>
    <ellipse cx="347" cy="127" rx="3.8" ry="2.4" fill="#f3b8a0" opacity="0.65"/>
    <ellipse cx="381" cy="127" rx="3.8" ry="2.4" fill="#f3b8a0" opacity="0.65"/>
    <path d="M359 130 Q364 134 369 130" stroke="#3d4e5e" stroke-width="2"/>
  </g>

  <!-- 観葉植物（右端） -->
  <g>
    <path d="M432 226 h28 l-4 24 h-20 Z" fill="#e4ebef" stroke="#3d4e5e" stroke-width="2"/>
    <path d="M446 226 V206 M446 214 q-12 -4 -14 -16 q12 2 14 16 Z M446 210 q12 -6 12 -18 q-12 4 -12 18 Z" fill="#8fa83d" stroke="#3d4e5e" stroke-width="1.8"/>
  </g>
</svg>
